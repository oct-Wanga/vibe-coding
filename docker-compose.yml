version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    image: python:3.12-slim
    working_dir: /app
    env_file:
      - ./apps/api/env.docker.defaults
    volumes:
      - ./apps/api:/app
    command: sh -c "pip install -r /app/requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      SESSION_STORE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      OUTBOX_ENABLED: "true"
      OUTBOX_RELAY_ENABLED: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_PROJECTS_CREATED_TOPIC: projects.project-created.v1
      KAFKA_CLIENT_ID: fastapi-outbox-relay-docker
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-docker}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-api-docker}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0.0}
      SENTRY_SEND_DEFAULT_PII: ${SENTRY_SEND_DEFAULT_PII:-false}
    ports:
      - "8000:8000"
    depends_on:
      - redis

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis
    volumes:
      - redisinsight:/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_BACKEND: fastapi
        FASTAPI_BASE_URL: http://api:8000
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-production}
        NEXT_PUBLIC_SENTRY_RELEASE: ${NEXT_PUBLIC_SENTRY_RELEASE:-web-docker}
        NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE:-0.1}
        NEXT_PUBLIC_SENTRY_PROFILES_SAMPLE_RATE: ${NEXT_PUBLIC_SENTRY_PROFILES_SAMPLE_RATE:-0.0}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      API_BACKEND: fastapi
      FASTAPI_BASE_URL: http://api:8000
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-production}
      NEXT_PUBLIC_SENTRY_RELEASE: ${NEXT_PUBLIC_SENTRY_RELEASE:-web-docker}
      NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE:-0.1}
      NEXT_PUBLIC_SENTRY_PROFILES_SAMPLE_RATE: ${NEXT_PUBLIC_SENTRY_PROFILES_SAMPLE_RATE:-0.0}
    depends_on:
      - api

volumes:
  redisinsight:
