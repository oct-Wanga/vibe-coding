version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    image: python:3.12-slim
    working_dir: /app
    env_file:
      - .env.local
    volumes:
      - ./apps/api:/app
    command: sh -c "pip install -r /app/requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      SESSION_STORE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      OUTBOX_ENABLED: "true"
      OUTBOX_RELAY_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_PROJECTS_CREATED_TOPIC: projects.project-created.v1
      KAFKA_CLIENT_ID: fastapi-outbox-relay-docker
    ports:
      - "8000:8000"
    depends_on:
      - redis

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis
    volumes:
      - redisinsight:/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_BACKEND: fastapi
        FASTAPI_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      API_BACKEND: fastapi
      FASTAPI_BASE_URL: http://api:8000
    depends_on:
      - api

volumes:
  redisinsight:
